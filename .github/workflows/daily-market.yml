name: Daily A-share Market Report

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. This is 16:15 in Asia/Shanghai.
    - cron: "15 8 * * 1-5"
    # Backup triggers in case GitHub drops or delays one scheduled run.
    - cron: "37 8 * * 1-5"
    - cron: "17 9 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate report
        run: python -m src.run_daily

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports site
          if ! git diff --cached --quiet; then
            git commit -m "Update daily market report"
            git pull --rebase origin main
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
